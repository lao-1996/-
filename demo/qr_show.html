<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫码玩游戏</title>
<style>
  body {
    margin: 0;
    background: #0d0d1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Microsoft YaHei', sans-serif;
    color: #fff;
  }
  .card {
    background: #1a1a2e;
    border-radius: 20px;
    padding: 40px;
    text-align: center;
    box-shadow: 0 0 40px rgba(255,105,180,0.3);
    border: 1px solid rgba(255,105,180,0.2);
  }
  h1 { font-size: 22px; margin: 0 0 8px; color: #ff69b4; }
  p  { font-size: 13px; color: #aaa; margin: 0 0 24px; }
  img { width: 260px; height: 260px; border-radius: 12px; background: #fff; padding: 12px; }
  .url {
    margin-top: 20px;
    background: #0d0d1a;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    color: #7ec8e3;
    letter-spacing: 0.5px;
    word-break: break-all;
  }
  .tip { margin-top: 16px; font-size: 12px; color: #666; }
</style>
</head>
<body>
<div class="card">
  <h1>🎮 奔赴心意的冒险 · 手游版</h1>
  <p>手机与电脑连同一个 Wi-Fi，扫码即玩</p>
  <img src="https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=http%3A%2F%2F192.168.43.17%3A8080%2Fgame_mobile.html&color=ff69b4&bgcolor=ffffff" alt="游戏二维码">
  <div class="url">http://192.168.43.17:8080/game_mobile.html</div>
  <div class="tip">也可以直接在手机浏览器输入上方地址</div>
</div>
</body>
</html>
